---
code: |
  #paysAC = "No"
  #paysElec = "No"
  #paysTelephone = "No"
  # Set defaults for Conditionally hidden fields.
  #if isHomeless == "Yes":  
  #  paysAC = "No"
  #  paysElec = "No"
  #  paysTelephone = "No"
  #else:
  #  if paysAC == "Yes":
  #    paysElec = "No"
  #    paysTelephone = "No"
  #  elif paysElec == "Yes":
  #    paysTelephone = "No"

  # Step 1. Household
  # Calculate based on eligible HH members, if different from HHSize
  HHSizeAdjusted = HHSize
  if ineligble_members:
    HHSizeAdjusted = HHSize - ineligble_member_count
  
  # Step 2. Gross Income Test
  # Convert weekly and biweekly income to monthly amount
  WUIC = WUI * 4.333    
  biWUIC = biWUI * 2.17
  WEIC = WEI * 4.333
  biWEIC = biWEI * 2.17
  
  # 2A, 2B Gross Earned and Unearned amounts.   
  GMUI = round(MUI + WUIC + biWUIC, 0)
  GMEI = round(MEI + WEIC + biWEIC, 0)  
  
  #2D Add up Unearned and Earned income
  TGMI = round(GMUI + GMEI - ChildSupport, 0)
  
  # 200% poverty level/gross income test for HH
  # HH generally categorically eligible if gross income is <= 200% federal poverty level.
  if HHSizeAdjusted <= 8:
    TwoHundredPctPov = arrTwoHundredTable[HHSizeAdjusted-1]
  else:            
    TwoHundredPctPov = arrTwoHundredTable[7]+((HHSizeAdjusted-8)*arrTwoHundredTable[8])
  GrossIncomeLessThan200FPL = TGMI < TwoHundredPctPov

  AssetTestScreenLink = "Read [Income and Asset Limits for the Food Assistance Program (FAP)](https://michiganlegalhelp.org/resources/public-assistance/income-and-asset-limits-food-assistance-program-fap#the-asset-limit) to learn more."
  
  if ElderlyOrDisabled == "Yes" and not GrossIncomeLessThan200FPL:
    ApplyAssetTest = "Yes"
    AssetTestScreenMsg = "Because your household gross income is more than 200% of the federal poverty level, you likely also have to meet an asset limit to qualify for food stamps."
  elif ineligble_members == True:
    ApplyAssetTest = "Yes"
    AssetTestScreenMsg = "If a household member was disqualified for certain reasons, you might also have to meet an asset limit to qualify for food stamps."
  else:
    ApplyAssetTest = "No"
    AssetTestScreenMsg = "There is likely no asset limit for your household."

  # Gross Income Test Result
  GITTag = ""
  #if ElderlyOrDisabled == "No":
  if GrossIncomeLessThan200FPL:
    GITResult = "PASSED"
  else:
    GITResult = "FAILED"
    if ElderlyOrDisabled == "Yes":
      GITTag = " (may still be eligible if net income test passes and asset limit is met)"
  #else:
    #GITResult = "PASSED"

  # Step 3. Net Income Test
  # 3-1-A. Standard Deduction
  if HHSizeAdjusted < 6:
    StdDed = arrStdDed[HHSizeAdjusted-1]
  else:
    StdDed = arrStdDed[5]
  
  # 3-1-B. Earned income deduction
  EarnedDed = GMEI * PCT_TO_EARNED_INCOME_DED
  
  # 3-1-C. Medical deductions
  # The SMD is $165 for expenses over $35, if the visitor has an actual medical expense that 
  # is more than the SMD, they can deduct the entire expense, minus $35, if they can verify it. 
  ExcessMedDed = 0
  ExcessMedTag = ""
  if ElderlyOrDisabled == "Yes":
    ElderlyOrDisabled1 = "Yes" #for 2nd display in docx.
    if MedDed < MEDICAL_THRESHOLD:
      ExcessMedDed = 0.00
    # Over the SMD. Subtract 35 if that will result in something greater than SMD
    # i.e. if expenses are 220, the deduction will be 220 - 35 = 185
    elif MedDed >= (MEDICAL_STANDARD + MEDICAL_THRESHOLD):
      ExcessMedDed = MedDed - MEDICAL_THRESHOLD
      ExcessMedTag = f" (You must be able to verify expenses over ${ MEDICAL_STANDARD })"
    # Over the SMD but don't want to subtract 35.
    # i.e. if expenses are 180, use the SMD instead of 180 - 35 (145, which is LESS than SMD)
    elif MedDed > MEDICAL_STANDARD:
      ExcessMedDed = MedDed
      ExcessMedTag = f" (You must be able to verify expenses over ${ MEDICAL_STANDARD })"
    # Use SMD
    else:
      ExcessMedDed = MEDICAL_STANDARD
    
    #temp = MedDed - MEDICAL_THRESHOLD
    #if MedDed > 190:	
    #  ExcessMedDed = temp			
		#elif temp > 0:		  
    #  ExcessMedDed = 155.00
  else:        
    ElderlyOrDisabled1 = "No"	
    
  # 3-1 Total
  totDeduction = StdDed + EarnedDed + ExcessMedDed + DepCareDed
  tempSum = TGMI - totDeduction
  PreAdjAfterDed = max(0, tempSum)
  
  # 3-2 Expense Deductions
  # Shelter deductions
  #if isHomeless == "Yes":  	  
  #  TotShelterDed = 0       
  #else:
  #  TotShelterDed = RentMortgageDed + HomeownerDed
  if rentOrMortgage == "Yes":
    TotShelterDed = RentMortgageDed + HomeownerDed
  else:
    TotShelterDed = 0

  # Utility deduction
	StdUtilAllowance = 0
  tempUtilityList = []
  utilityList = "None"
  tempUtilityListTextOnly = []
  utilityListTextOnly = "None"
  
  if rentOrMortgage == "Yes" and paysAC == "Yes":
    StdUtilAllowance += SHELTER_HEAT_UTILITY
  if rentOrMortgage == "No":
    if utilitiesPaid['electricity']:
      StdUtilAllowance += SHELTER_ELECTRICITY
      tempUtilityList.append('Non-heat Electric ($' + str(SHELTER_ELECTRICITY) + ')')
      tempUtilityListTextOnly.append('Non-heat Electric')
    if utilitiesPaid['water']:
      StdUtilAllowance += SHELTER_WATER
      tempUtilityList.append('Water ($' + str(SHELTER_WATER) + ')')
      tempUtilityListTextOnly.append('Water')
    if utilitiesPaid['phone']:
      StdUtilAllowance += SHELTER_PHONE
      tempUtilityList.append('Phone ($' + str(SHELTER_PHONE) + ')')
      tempUtilityListTextOnly.append('Phone')
    if utilitiesPaid['fuel']:
      StdUtilAllowance += SHELTER_FUEL
      tempUtilityList.append('Cooking fuel ($' + str(SHELTER_FUEL) + ')')
      tempUtilityListTextOnly.append('Cooking fuel')
    if utilitiesPaid['trash']:
      StdUtilAllowance += SHELTER_TRASH
      tempUtilityList.append('Trash ($' + str(SHELTER_TRASH) + ')')
      tempUtilityListTextOnly.append('Trash')
    if utilitiesPaid.any_true():
      utilityList = "\t".join(tempUtilityList)
      utilityListTextOnly = ", ".join(tempUtilityListTextOnly)

  # 3-2-A. Total Shelter Costs
	TotShelterCosts = TotShelterDed + StdUtilAllowance
	# 50% adjusted income calculations
	FiftyPctAdjIC = PreAdjAfterDed * 0.50
	# Shelter deduction in excess of 50% of adjusted income
  InitialShelterDeduction = TotShelterCosts - FiftyPctAdjIC
	ShelterDedExcessFiftyPct = max(0, TotShelterCosts - FiftyPctAdjIC)	
	CapShelterDed = SHELTER_DED_CAP
  
  # 3-2-B. Shelter Deduction Result
	if ElderlyOrDisabled == "Yes":
		ShelterDedResult = ShelterDedExcessFiftyPct
	else:
		ShelterDedResult = min(ShelterDedExcessFiftyPct, CapShelterDed)
    
  # Homeless Deduction
  if isHomeless == "Yes":
    HomelessDed = SHELTER_HOMELESS
  else:
    HomelessDed = 0

  # 3-2-C. Total Shelter Deduction. BEM 554 states that an individual can choose between their 
  # shelter expenses or the homeless deduction (if both are applicable).
  # For the purposes of this tool, we will automatically use whichever is higher.
  ShelterNote = ""
  if ShelterDedResult > 0 and HomelessDed == 0:
    TotalShelterDed = ShelterDedResult
  elif ShelterDedResult == 0 and HomelessDed > 0:
    TotalShelterDed = HomelessDed
  elif HomelessDed > ShelterDedResult:
    TotalShelterDed = HomelessDed
    ShelterNote = "In your situation, the standard homeless deduction is higher than your shelter deductions, so it will be used in your Net Income Calculation. An MDHHS caseworker will ultimately give you a choice, but this tool uses the higher deduction."
  else:
    TotalShelterDed = ShelterDedResult
    if HomelessDed > 0:
      ShelterNote = "In your situation, your shelter deduction is greater than the standard homeless deduction, so it will be used in your Net Income Calculation. An MDHHS caseworker will ultimately give you a choice, but this tool uses the higher deduction."
  
  # 3-3-A. Net Income Calculation
  #MonthlyNIC = PreAdjAfterDed - HomelessDed - ShelterDedResult
  MonthlyNIC = PreAdjAfterDed - TotalShelterDed
  MonthlyNICforDisplay = str(currency(round(MonthlyNIC,0)))
  MaxTotMonthlyNIC = 0

  # Does net income test apply?
  # Per BEM 213 "Verification" section, if HH is categorically eligible (i.e. TGMI <= 200% FPL),
  #   do NOT verify 130% gross income limit or 100% net income limit.
  # Also per BEM 213, if NOT categorically eligible (i.e. TGMI > 200% FPL) but has SVD, HH
  #   may be eligible if passes net income test (RFT 250 column B) and meets asset limit.
  if not GrossIncomeLessThan200FPL and ElderlyOrDisabled == "Yes":
    ApplyNetIncomeTest = "Yes"
  else:
    ApplyNetIncomeTest = "No"

  if ApplyNetIncomeTest == "No":
		if MonthlyNIC < 0:			
      MaxTotMonthlyNICLabel = str(currency(round(MaxTotMonthlyNIC,0)))
		else:
      # 100000 is an arbitrarily large number so that no one can hit it.
			MaxTotMonthlyNIC = 1000000
      MaxTotMonthlyNICLabel = "No Limit"  
	elif ApplyNetIncomeTest == "Yes":
    if(HHSizeAdjusted <= 8):
      MaxTotMonthlyNIC = arrMaxAllowableNIC[HHSizeAdjusted-1]
    else:
      MaxTotMonthlyNIC = arrMaxAllowableNIC[7]+((HHSizeAdjusted-8)*arrMaxAllowableNIC[8])
    MaxTotMonthlyNICLabel = str(currency(round(MaxTotMonthlyNIC,0), decimals=False))

  # 3-3. NET INCOME TEST result
  if MaxTotMonthlyNIC >= 100000:
		NICTestResult = "PASSED"
	elif MonthlyNIC < MaxTotMonthlyNIC:
		NICTestResult = "PASSED"
	else:
		NICTestResult = "FAILED"
  
  # Step 4. Final Determination
  ThirtyPctNIC = max(0, round(MonthlyNIC * NET_INCOME_PCT,0));
	if ThirtyPctNIC > 0:
		Step41 = ThirtyPctNIC
	else:
		Step41 = 0.0
	if HHSizeAdjusted <= 8:
		MaxSNAPAllotment = arrMaxSNAPAllotment[HHSizeAdjusted-1]
	else:
		MaxSNAPAllotment = arrMaxSNAPAllotment[7]+((HHSizeAdjusted-8)*arrMaxSNAPAllotment[8])
  tempFinal = MaxSNAPAllotment - Step41
  FinalResult = 0
  MinimumGrantTag = ''

  # Check that they qualify. Per BEM 213, SDV households may still qualify if net income is 
  # below 100% FPL and asset limit is met, even if gross income is too high.
	if (GITResult == "PASSED" and NICTestResult == "PASSED") or (GITResult == "FAILED" and NICTestResult == "PASSED" and ElderlyOrDisabled == "Yes"):
    if HHSizeAdjusted <= MINIMUM_SIZE_OF_HOUSEHOLD: 
      FinalResult = max(tempFinal, MINIMUM_GRANT)
      if MINIMUM_GRANT > tempFinal:
        MinimumGrantTag = '(minimum grant)'
    else:
      FinalResult = tempFinal

